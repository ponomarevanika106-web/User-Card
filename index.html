<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>User Card</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>

<div class="card">
  <div class="card-header">
    <p class="location">📍 Sheffield, United Kingdom</p>
    <img class="avatar" src="/assets/img/AM.png" alt="">
    <h2>Arctic Monkeys</h2>
    <p class="description">
      Arctic Monkeys are an English rock band formed in Sheffield in 2002.
    </p>
    <button class="follow-btn">Follow</button>
  </div>

  <div class="card-footer">
    <div class="stat">
      <span>📷</span>
      <p>Posts<br><strong>635</strong></p>
    </div>
    <div class="stat">
      <span>❤️</span>
      <p>Favorites<br><strong>3,472</strong></p>
    </div>
    <div class="stat">
      <span>✉️</span>
      <p>Messages<br><strong>1,293</strong></p>
    </div>
  </div>
</div>

</body>
</html>
