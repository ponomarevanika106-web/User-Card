<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>User Card</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>

<div class="card">
  <div class="card-header">
    <p class="location">📍 Sheffield, United Kingdom</p>
    <img class="avatar" src="/assets/img/AM.png" alt="">
    <h2>Arctic Monkeys</h2>
    <p class="description">
      Arctic Monkeys are an English rock band formed in Sheffield in 2002.
    </p>
    <button class="follow-btn">Follow</button>
  </div>

 <div class="card-footer">
  
  <section class="stat">
    <p>📷</p>
    <div>
    <span>Posts</span>
    <span>635</span>
    </div>
  </section>

  <section class="stat">
    <p>❤️</p>
    <div>
    <span>Favorites</span>
    <span>3,472</span>
    </div>
  </section>

  <section class="stat">
    <p>✉️</p>
    <div>
    <span>Messages</span>
    <span>1,293</span>
    </div>
  </section>

</div>
  </div>

</body>
</html>
